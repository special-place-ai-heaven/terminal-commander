# cargo-deny configuration for Terminal Commander.
#
# Authoritative scope reference: CONTRIBUTING.md sections 4 and 6.
# Project license: PolyForm-Noncommercial-1.0.0 (see LICENSE). The allow
# list below covers BOTH our own crates' license and the dependency closure.

[graph]
all-features = true

[licenses]
# Allow the set of licenses present in our dependency closure and in
# our own crates. The Terminal Commander crates are
# PolyForm-Noncommercial-1.0.0 (project license). CC0-1.0 is required
# because `notify` core ships under CC0; `notify-debouncer-full` and
# `file-id` are MIT OR Apache-2.0; rmcp is MIT OR Apache-2.0 / Apache-2.0.
allow = [
    "PolyForm-Noncommercial-1.0.0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = []

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
ignore = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
