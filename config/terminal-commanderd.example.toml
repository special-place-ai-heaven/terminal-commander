# Example configuration for terminal-commanderd.
#
# Copy to ~/.config/terminal-commanderd/terminal-commanderd.toml
# and edit as needed. SAFE TO COMMIT (no secrets).
#
# Loaded by `terminal-commanderd --config <path> <subcommand>`. If
# the daemon is invoked without `--config`, the platform default
# `$HOME/.local/share/terminal-commanderd` is used.

[daemon]
# Data directory holding the SQLite event store + audit log.
# MUST be on a native Linux filesystem (NOT /mnt/c on WSL2). See
# docs/storage/EVENT_STORE.md section 3 and
# docs/research/wsl-boundary.md.
data_dir = "${HOME}/.local/share/terminal-commanderd"

# Local UDS socket path. If omitted, defaults to
# <data_dir>/terminal-commanderd.sock. The daemon binds this socket
# when `start --mode ipc-server` (the TC37 default on Unix).
# socket_path = "${XDG_RUNTIME_DIR}/terminal-commanderd.sock"

# Runtime mode. One of:
# - "self_check"       — bootstrap, run self-check, exit. Used by
#                        `terminal-commanderd check`.
# - "foreground_idle"  — bootstrap, idle in foreground until
#                        SIGINT/SIGTERM. No IPC.
# - "ipc_server"       — bootstrap, bind UDS, accept TC37 minimal
#                        method set, idle until shutdown. The
#                        `start` subcommand uses this mode on Unix
#                        by default.
runtime_mode = "self_check"

[policy]
# One of: developer_local, repo_only, read_only_observer, admin_debug
# (see POLICY.md section 2).
profile = "developer_local"
profile_version = "1"

# $REPO_ROOT for repo_only containment (POLICY.md section 2.2). REQUIRED
# when profile = "repo_only"; the daemon refuses to start without it.
# Ignored for other profiles. repo_only denies any file read/watch or
# command whose path/cwd resolves outside this tree.
# repo_root = "/home/me/projects/my-repo"

# [policy.commands] — command allow-list (POLICY.md section 4).
# Matched by argv[0] basename. When OMITTED (or empty), Terminal Commander
# allows any command that is not in the cross-profile structural deny set
# (sudo/doas/su/pkexec/kexec/polkit) — this keeps zero-config usage
# working for arbitrary dev commands. Setting a non-empty list OPTS IN to
# default-deny: only the listed commands run; everything else is denied
# with reason `no_allow_rule`. Applies to developer_local and repo_only.
# [policy.commands]
# allow_roots = ["cargo", "npm", "pytest", "make", "ls", "git"]

# [policy.paths] and [policy.probes] (POLICY.md section 4) are parsed and
# reserved; allow/deny-list enforcement beyond repo_only containment and
# the default-deny sensitive-suffix list is a later phase.
# [policy.paths]
# read_allow  = ["/home/me/projects/**"]
# [policy.probes]
# allow_kinds = ["process", "terminal", "pty", "file", "directory"]

[retention]
# Per-bucket retention; matches the TC07/TC12 in-memory and
# persistent defaults.
max_events  = 100_000
ttl_seconds = 86_400  # 24h

[audit]
# Audit log retention (days). Advisory at MVP; the daemon does not
# yet evict old audit rows.
retention_days = 30

[limits]
# Per-call response caps. Both are CLAMPED at config load to the
# codebase hard caps:
# - file_window_bytes   ceiling = 65 536  (MAX_FILE_WINDOW_BYTES)
# - bucket_read_limit   ceiling = 10 000  (MAX_READ_LIMIT)
file_window_bytes = 65_536
bucket_read_limit = 200
