#
# NPM05 — npm binary build matrix (post-collapse).
#
# Calls _build-platform-binary.yml for each tier-1 + macOS target so the
# PR-time CI gate uses the EXACT SAME build steps as the release-time
# publish jobs. Eliminates drift permanently.
#
# Also runs the workspace-level pre-build gates (fmt, clippy, nextest)
# on the x64 leg only — those are runtime-correctness gates, not build
# gates, and we don't need them on every platform.

name: npm-binary-build

# Branch-protection footgun (do NOT re-add a `paths:` filter to
# `pull_request` here).
#
# The `main-protection` ruleset marks EIGHT contexts from this workflow as
# REQUIRED status checks:
#   pre-build-gates (linux-x64), pre-build-gates (windows-x64),
#   build-linux-x64 / build-linux-x64, build-linux-arm64 / build-linux-arm64,
#   build-windows-x64 / build-windows-x64, build-mac-x64 / build-mac-x64,
#   build-mac-arm64 / build-mac-arm64, npm-pack (after all builds).
#
# GitHub's "required check + path filter" interaction: if a PR touches ONLY
# paths that the `pull_request.paths` filter excludes (e.g. a workflow-only
# change to release-please.yml, or a docs-only change), this workflow does NOT
# run, so those eight required contexts NEVER report. A required check that
# never reports is treated as pending forever -> mergeStateStatus=BLOCKED, and
# the PR can only land via admin override. This already bit PR #85 (a
# release-please.yml-only fix needed an admin merge).
#
# Because ALL EIGHT required contexts are produced by THIS workflow (the gates,
# every build-* matrix leg, and npm-pack), a single "no-op skip" job cannot
# fix it -- it could only satisfy one context name; the other seven would stay
# pending. The robust cure within `.github/workflows/` scope is to drop the
# `pull_request.paths` filter entirely so EVERY PR to `main` runs the full
# chain and reports all eight required contexts. No PR can be permanently
# BLOCKED.
#
# Trade-off (accepted, not avoidable here): a docs-only or workflow-only PR now
# runs the full native 5-platform build matrix. That cost is inherent to the
# ruleset requiring the `build-*` legs as gates -- the only way the
# `build-mac-arm64 / build-mac-arm64` context can report success is to actually
# run the reusable build. Skipping the build for trivial paths would require
# removing those build legs from the required set in the ruleset (outside the
# `.github/workflows/` change scope). If that cost becomes a problem, the
# follow-up is to narrow the REQUIRED set in `main-protection` to just the two
# `pre-build-gates`, then a path-aware no-op skip becomes viable.
#
# `push` (main only) also drops its `paths` filter so the post-merge build/
# provenance gate always runs on `main` and is never silently skipped by the
# same footgun.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: npm-binary-build-${{ github.ref }}
  cancel-in-progress: false

env:
  # Run node20 JS actions on node24 ahead of GitHub's 2026-06-02 cutover.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  pre-build-gates:
    name: pre-build-gates (linux-x64)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      RUST_TOOLCHAIN: "1.95.0"
      NODE_VERSION: "20"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: x86_64-unknown-linux-gnu
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: npm-binary-build-pre-gates
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: taiki-e/install-action@nextest
      - name: pre-build gates (scripts/linux-gate.sh)
        run: bash scripts/linux-gate.sh

  pre-build-gates-windows:
    name: pre-build-gates (windows-x64)
    runs-on: windows-2022
    permissions:
      contents: read
    env:
      RUST_TOOLCHAIN: "1.95.0"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: npm-binary-build-pre-gates-windows
      - name: pre-build gates (scripts/windows-gate.ps1)
        shell: pwsh
        run: ./scripts/windows-gate.ps1

  build-linux-x64:
    needs: pre-build-gates
    uses: ./.github/workflows/_build-platform-binary.yml
    with:
      platform: linux-x64
      upload_artifact: true

  build-linux-arm64:
    needs: pre-build-gates
    uses: ./.github/workflows/_build-platform-binary.yml
    with:
      platform: linux-arm64
      upload_artifact: true

  build-windows-x64:
    needs: [pre-build-gates, pre-build-gates-windows]
    uses: ./.github/workflows/_build-platform-binary.yml
    with:
      platform: windows-x64
      upload_artifact: true

  build-mac-x64:
    needs: pre-build-gates
    uses: ./.github/workflows/_build-platform-binary.yml
    with:
      platform: mac-x64
      upload_artifact: true

  build-mac-arm64:
    needs: pre-build-gates
    uses: ./.github/workflows/_build-platform-binary.yml
    with:
      platform: mac-arm64
      upload_artifact: true

  npm-pack:
    name: npm-pack (after all builds)
    needs:
      - build-linux-x64
      - build-linux-arm64
      - build-windows-x64
      - build-mac-x64
      - build-mac-arm64
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Download all 5 platform bin artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: tc-bin-*
          path: artifacts/
      - name: Stage artifacts into platform bin dirs
        shell: bash
        run: |
          set -euo pipefail
          for plat in linux-x64 linux-arm64 windows-x64 mac-x64 mac-arm64; do
            pkg_dir="packages/terminal-commander-${plat}"
            # actions/download-artifact@v4 stays at the per-artifact dir; bin.tar lives inside.
            tar_path="artifacts/tc-bin-${plat}/bin.tar"
            if [ ! -f "$tar_path" ]; then
              echo "::error::expected $tar_path missing — reusable workflow may have changed format"
              ls -la "artifacts/tc-bin-${plat}/" || true
              exit 1
            fi
            rm -rf "${pkg_dir}/bin"
            tar -xf "$tar_path" -C "$pkg_dir"
            ls -la "${pkg_dir}/bin"
          done
      - name: npm pack — all 5 platform packages + root
        shell: bash
        run: |
          set -e
          mkdir -p tarballs
          for plat in linux-x64 linux-arm64 windows-x64 mac-x64 mac-arm64; do
            (cd "packages/terminal-commander-${plat}" && npm pack --pack-destination "$GITHUB_WORKSPACE/tarballs")
          done
          (cd packages/terminal-commander && npm pack --pack-destination "$GITHUB_WORKSPACE/tarballs")
          ls -la tarballs/
      - uses: actions/upload-artifact@v4
        with:
          name: npm-tarballs
          path: tarballs/*.tgz
          if-no-files-found: error
          retention-days: 14
