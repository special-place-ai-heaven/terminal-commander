# SPDX-License-Identifier: Apache-2.0
# Keep release-please PRs publishable, then auto-merge (no human gate).
name: release-pr-sync

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-optional-dependencies:
    if: github.head_ref == 'release-please--branches--main'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout release PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Sync optionalDependencies
        run: node scripts/release/sync-optional-dependencies.js

      - name: Sync Cargo workspace version to npm package version
        shell: bash
        run: |
          # release-please's `extra-files` does not allow paths outside the
          # package directory (no `..` allowed). To keep Cargo.toml +
          # crates/{daemon,mcp,probes}/Cargo.toml versions in lockstep with
          # the npm package version, sync them here in the release-pr-sync
          # workflow. Runs only on release-please's branch (gated by job if:).
          set -euo pipefail
          target_ver=$(node -p "require('./packages/terminal-commander/package.json').version")
          echo "target version: ${target_ver}"
          python3 scripts/release/sync-cargo-versions.py "${target_ver}"

      - name: Ensure release PR title includes version
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN_TC }}
        run: |
          set -euo pipefail
          ver=$(node -p "require('./packages/terminal-commander/package.json').version")
          want="chore: release ${ver}"
          title=$(gh pr view "${{ github.event.pull_request.number }}" --json title --jq .title)
          if [ "$title" != "$want" ]; then
            gh pr edit "${{ github.event.pull_request.number }}" --title "$want"
            echo "retitled PR to: ${want}"
          fi

      - name: Commit and push if changed
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN_TC }}
        run: |
          set -euo pipefail
          # Include npm package graph + Cargo files in the change check.
          # The sync steps above may have bumped any of them.
          paths=(
            .github/.release-please-manifest.json
            packages/terminal-commander/package.json
            packages/terminal-commander-linux-x64/package.json
            packages/terminal-commander-linux-arm64/package.json
            packages/terminal-commander-windows-x64/package.json
            packages/terminal-commander-mac-x64/package.json
            packages/terminal-commander-mac-arm64/package.json
            Cargo.toml
            Cargo.lock
            crates/daemon/Cargo.toml
            crates/mcp/Cargo.toml
            crates/probes/Cargo.toml
          )
          if git diff --quiet "${paths[@]}"; then
            echo "no version sync changes required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${paths[@]}"
          git commit -m "chore: sync optionalDependencies + Cargo versions to package version"
          git push origin HEAD:${{ github.head_ref }}

      - name: Enable auto-merge (fires when all checks pass)
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN_TC }}
        run: |
          # Codex review C2 (2026-05-25): branch protection now enforces
          # passing checks. Use --auto so GitHub queues the merge to fire
          # exactly when all required checks pass. No bypass via --admin.
          #
          # If branch protection isn't fully enforced (e.g. checks aren't
          # marked required), --auto silently downgrades to immediate merge
          # which is also acceptable for a release PR.
          set -euo pipefail
          pr="${{ github.event.pull_request.number }}"
          state=$(gh pr view "$pr" --json state --jq .state)
          if [ "$state" != "OPEN" ]; then
            echo "PR #${pr} is ${state}; skip enable-auto-merge"
            exit 0
          fi
          # --auto requires "Allow auto-merge" enabled on the repo. If not,
          # this command fails — operator must enable it once at
          # Settings → Pull Requests → Allow auto-merge.
          gh pr merge "$pr" --merge --auto --delete-branch || {
            echo "::warning::--auto failed (likely repo setting). Falling back to immediate merge."
            gh pr merge "$pr" --merge --delete-branch
          }
          echo "auto-merge enabled (or merged) for PR #${pr}"
