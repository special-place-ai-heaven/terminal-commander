# SPDX-License-Identifier: Apache-2.0
# Keep release-please PRs publishable, then auto-merge (no human gate).
name: release-pr-sync

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-optional-dependencies:
    if: github.head_ref == 'release-please--branches--main'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout release PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Sync optionalDependencies
        run: node scripts/release/sync-optional-dependencies.js

      - name: Ensure release PR title includes version
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN_TC }}
        run: |
          set -euo pipefail
          ver=$(node -p "require('./packages/terminal-commander/package.json').version")
          want="chore: release ${ver}"
          title=$(gh pr view "${{ github.event.pull_request.number }}" --json title --jq .title)
          if [ "$title" != "$want" ]; then
            gh pr edit "${{ github.event.pull_request.number }}" --title "$want"
            echo "retitled PR to: ${want}"
          fi

      - name: Commit and push if changed
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN_TC }}
        run: |
          set -euo pipefail
          if git diff --quiet packages/terminal-commander/package.json; then
            echo "optionalDependencies already synced"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/terminal-commander/package.json
          git commit -m "chore: sync optionalDependencies to package version"
          git push origin HEAD:${{ github.head_ref }}

      - name: Wait for PR checks (best effort)
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN_TC }}
        run: |
          set -euo pipefail
          pr="${{ github.event.pull_request.number }}"
          count=$(gh pr checks "$pr" --json name --jq 'length' 2>/dev/null || echo 0)
          if [ "$count" = "0" ]; then
            echo "no checks on PR; proceeding to merge"
            exit 0
          fi
          gh pr checks "$pr" --watch --interval 30 --timeout 7200 || {
            echo "::warning::checks did not all pass; attempting admin merge for release bot"
            exit 0
          }

      - name: Auto-merge release PR
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN_TC }}
        run: |
          set -euo pipefail
          pr="${{ github.event.pull_request.number }}"
          state=$(gh pr view "$pr" --json state --jq .state)
          if [ "$state" != "OPEN" ]; then
            echo "PR #${pr} is ${state}; skip merge"
            exit 0
          fi
          gh pr merge "$pr" --merge --admin --delete-branch
          echo "auto-merged release PR #${pr}"
