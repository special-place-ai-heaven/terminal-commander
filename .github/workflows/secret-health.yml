#
# Weekly probe of the 3 release-critical secrets. Opens a P1 issue
# if any fail. Catches the 365-day token-expiry cliff weeks before
# any release window cares.

name: secret-health

on:
  schedule:
    - cron: '0 9 * * MON'   # Monday 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  probe:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - uses: dtolnay/rust-toolchain@master
        with: { toolchain: "1.95.0" }

      - name: NPM_TOKEN_TC ŌĆö npm whoami
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN_TC }}
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN_TC }}
        shell: bash
        run: |
          set +e
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > ~/.npmrc
          out=$(npm whoami 2>&1)
          rc=$?
          if [ $rc -ne 0 ]; then
            gh issue create \
              --title "NPM_TOKEN_TC failing whoami" \
              --label "ops,P1" \
              --body "Weekly secret-health probe ŌĆö \`npm whoami\` failed:\n\n\`\`\`\n$out\n\`\`\`\n\nRotate at https://www.npmjs.com/settings/USER/tokens and update repo secret."
            exit 1
          fi
          echo "NPM_TOKEN_TC OK: $out"

      - name: CARGO_REGISTRY_TOKEN_TC ŌĆö crates.io probe
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN_TC }}
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN_TC }}
        shell: bash
        run: |
          set +e
          out=$(cargo search terminal-commander-mcp --limit 1 2>&1)
          rc=$?
          if [ $rc -ne 0 ]; then
            gh issue create \
              --title "CARGO_REGISTRY_TOKEN_TC failing" \
              --label "ops,P1" \
              --body "Weekly secret-health probe ŌĆö cargo search failed:\n\n\`\`\`\n$out\n\`\`\`\n\nRotate at https://crates.io/me and update repo secret."
            exit 1
          fi
          echo "CARGO_REGISTRY_TOKEN_TC OK"

      - name: RELEASE_PLEASE_TOKEN_TC ŌĆö gh auth status
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN_TC }}
        shell: bash
        run: |
          set +e
          out=$(gh auth status 2>&1)
          rc=$?
          if [ $rc -ne 0 ]; then
            # Use default GITHUB_TOKEN to file the issue (since this one is broken).
            GH_TOKEN=${{ secrets.GITHUB_TOKEN }} gh issue create \
              --title "RELEASE_PLEASE_TOKEN_TC failing" \
              --label "ops,P1" \
              --body "Weekly secret-health probe ŌĆö gh auth status failed:\n\n\`\`\`\n$out\n\`\`\`\n\nRotate the PAT at https://github.com/settings/tokens and update repo secret."
            exit 1
          fi
          echo "RELEASE_PLEASE_TOKEN_TC OK"
