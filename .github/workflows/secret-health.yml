#
# Weekly probe of the 3 release-critical secrets. Opens a P1 issue
# if any fail. Catches the 365-day token-expiry cliff weeks before
# any release window cares.

name: secret-health

on:
  schedule:
    - cron: '0 9 * * MON'   # Monday 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  # Run node20 JS actions on node24 ahead of GitHub's 2026-06-02 cutover.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # Let every `gh` call resolve the repo without a checkout (this probe has none),
  # else `gh issue create` dies with "fatal: not a git repository" and the alert
  # is never filed.
  GH_REPO: ${{ github.repository }}

jobs:
  probe:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - uses: dtolnay/rust-toolchain@master
        with: { toolchain: "1.95.0" }

      - name: NPM_TOKEN_TC — npm whoami
        env:
          # setup-node's registry-url already wrote $NPM_CONFIG_USERCONFIG/.npmrc
          # referencing ${NODE_AUTH_TOKEN}; supply that var so `npm whoami` actually
          # authenticates. The old `echo > ~/.npmrc` was shadowed by
          # NPM_CONFIG_USERCONFIG, so npm whoami ran token-less and 401'd every week.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_TC }}
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN_TC }}
        shell: bash
        run: |
          set +e
          out=$(npm whoami 2>&1)
          rc=$?
          if [ $rc -ne 0 ]; then
            # The `ops` + `P1` repo labels are created (see commit body) so the
            # alert files AND carries triage labels. If a label is ever deleted,
            # `gh issue create` fails with "could not add label" — recreate it,
            # do not drop the alert.
            # Build the body with printf so the newlines + code fence render as
            # real Markdown (a double-quoted "...\n..." would emit literal \n).
            printf 'Weekly secret-health probe: `npm whoami` failed:\n\n```\n%s\n```\n\nRotate the token at https://www.npmjs.com/settings/USER/tokens and update the NPM_TOKEN_TC repo secret.\n' "$out" > /tmp/npm_issue.md
            gh issue create \
              --title "NPM_TOKEN_TC failing whoami" \
              --label "ops,P1" \
              --body-file /tmp/npm_issue.md
            exit 1
          fi
          echo "NPM_TOKEN_TC OK: $out"

      - name: CARGO_REGISTRY_TOKEN_TC — crates.io authenticated probe
        env:
          CARGO_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN_TC }}
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN_TC }}
        shell: bash
        run: |
          # crates.io's /api/v1/me is an `only_cookie` endpoint: it returns HTTP 403
          # for EVERY API token — valid OR revoked — BEFORE any expiry/scope check.
          # (Confirmed against rust-lang/crates.io src/auth.rs `split_once` + Bearer
          # accept, controllers/user/me.rs `AuthCheck::only_cookie`, and a live prod
          # probe on 2026-06-24.) So the previous `http_code == 200` assertion was
          # STRUCTURALLY impossible — it fired a false token alarm on EVERY run, which
          # then also failed to file (missing label). The reliable liveness signal is
          # the RESPONSE BODY, not the status code:
          #   live token   -> "...can only be performed on the crates.io website"
          #   dead/revoked -> "authentication failed"
          #   malformed    -> "does not match the format used by crates.io"
          # `Bearer ` is accepted+stripped by crates.io, so the prefix is harmless;
          # the body assertion below is the actual fix.
          set +e
          http=$(curl -sS -o /tmp/me.json -w '%{http_code}' \
            -H "Authorization: Bearer $CARGO_TOKEN" \
            -H 'User-Agent: terminal-commander-secret-health (https://github.com/special-place-administrator/terminal-commander)' \
            https://crates.io/api/v1/me)
          rc=$?
          body=$(cat /tmp/me.json 2>/dev/null || echo "(no body)")
          # Always surface the exact code + body so any future failure self-diagnoses.
          echo "crates.io /api/v1/me -> curl_rc=$rc http=$http"
          echo "body: $body"
          if printf '%s' "$body" | grep -q "can only be performed on the crates.io website"; then
            echo "CARGO_REGISTRY_TOKEN_TC OK (token is LIVE)"
            exit 0
          fi
          if printf '%s' "$body" | grep -qE "authentication failed|does not match the format"; then
            # Genuinely dead/revoked/expired/malformed -> a HUMAN must rotate it.
            printf 'Weekly secret-health probe: crates.io /api/v1/me returned HTTP %s, body:\n\n```\n%s\n```\n\nThe token is revoked, expired, or malformed. Rotate at https://crates.io/settings/tokens and update the CARGO_REGISTRY_TOKEN_TC repo secret.\n' "$http" "$body" > /tmp/cargo_issue.md
            gh issue create \
              --title "CARGO_REGISTRY_TOKEN_TC is dead (crates.io rejected the token)" \
              --label "ops,P1" \
              --body-file /tmp/cargo_issue.md
            exit 1
          fi
          # Anything else (5xx, blocked UA, HTML, network) is INCONCLUSIVE — do NOT
          # cry wolf on the token; flag it for a human to eyeball.
          printf 'Weekly secret-health probe: crates.io /api/v1/me returned an UNEXPECTED HTTP %s (curl_rc=%s), body:\n\n```\n%s\n```\n\nThis is NOT a confirmed token failure — it may be a crates.io 5xx, a User-Agent block, or a network error. Re-run the workflow; if it persists, inspect manually before rotating the token.\n' "$http" "$rc" "$body" > /tmp/cargo_issue.md
          gh issue create \
            --title "CARGO_REGISTRY_TOKEN_TC probe inconclusive (crates.io HTTP unexpected)" \
            --label "ops,P1" \
            --body-file /tmp/cargo_issue.md
          exit 2

      - name: RELEASE_PLEASE_TOKEN_TC — gh auth status
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN_TC }}
        shell: bash
        run: |
          set +e
          out=$(gh auth status 2>&1)
          rc=$?
          if [ $rc -ne 0 ]; then
            # Build the body with printf so the newlines + code fence render as
            # real Markdown. Use the default GITHUB_TOKEN to file (this PAT is broken).
            printf 'Weekly secret-health probe: `gh auth status` failed:\n\n```\n%s\n```\n\nRotate the PAT at https://github.com/settings/tokens and update the RELEASE_PLEASE_TOKEN_TC repo secret.\n' "$out" > /tmp/gh_issue.md
            GH_TOKEN=${{ secrets.GITHUB_TOKEN }} gh issue create \
              --title "RELEASE_PLEASE_TOKEN_TC failing" \
              --label "ops,P1" \
              --body-file /tmp/gh_issue.md
            exit 1
          fi
          echo "RELEASE_PLEASE_TOKEN_TC OK"
