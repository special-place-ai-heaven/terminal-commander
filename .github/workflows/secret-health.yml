#
# Weekly probe of the 3 release-critical secrets. Opens a P1 issue
# if any fail. Catches the 365-day token-expiry cliff weeks before
# any release window cares.

name: secret-health

on:
  schedule:
    - cron: '0 9 * * MON'   # Monday 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  # Run node20 JS actions on node24 ahead of GitHub's 2026-06-02 cutover.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # Let every `gh` call resolve the repo without a checkout (this probe has none),
  # else `gh issue create` dies with "fatal: not a git repository" and the alert
  # is never filed.
  GH_REPO: ${{ github.repository }}

jobs:
  probe:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - uses: dtolnay/rust-toolchain@master
        with: { toolchain: "1.95.0" }

      - name: NPM_TOKEN_TC — npm whoami
        env:
          # setup-node's registry-url already wrote $NPM_CONFIG_USERCONFIG/.npmrc
          # referencing ${NODE_AUTH_TOKEN}; supply that var so `npm whoami` actually
          # authenticates. The old `echo > ~/.npmrc` was shadowed by
          # NPM_CONFIG_USERCONFIG, so npm whoami ran token-less and 401'd every week.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_TC }}
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN_TC }}
        shell: bash
        run: |
          set +e
          out=$(npm whoami 2>&1)
          rc=$?
          if [ $rc -ne 0 ]; then
            gh issue create \
              --title "NPM_TOKEN_TC failing whoami" \
              --label "ops,P1" \
              --body "Weekly secret-health probe — \`npm whoami\` failed:\n\n\`\`\`\n$out\n\`\`\`\n\nRotate at https://www.npmjs.com/settings/USER/tokens and update repo secret."
            exit 1
          fi
          echo "NPM_TOKEN_TC OK: $out"

      - name: CARGO_REGISTRY_TOKEN_TC — crates.io authenticated probe
        env:
          CARGO_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN_TC }}
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN_TC }}
        shell: bash
        run: |
          # Codex review I4 (2026-05-25): `cargo search` is UNAUTHENTICATED and
          # would mask a revoked CARGO_REGISTRY_TOKEN_TC. Use crates.io's /api/v1/me
          # endpoint with Bearer auth — fails fast (HTTP 401/403) when token is bad.
          set +e
          http_code=$(curl -sS -o /tmp/me.json -w '%{http_code}' \
            -H "Authorization: Bearer $CARGO_TOKEN" \
            -H 'User-Agent: terminal-commander-secret-health (https://github.com/special-place-administrator/terminal-commander)' \
            https://crates.io/api/v1/me)
          rc=$?
          if [ $rc -ne 0 ] || [ "$http_code" != "200" ]; then
            body=$(head -c 500 /tmp/me.json 2>/dev/null || echo "(no body)")
            gh issue create \
              --title "CARGO_REGISTRY_TOKEN_TC failing crates.io /me probe" \
              --label "ops,P1" \
              --body "Weekly secret-health probe — crates.io /api/v1/me returned HTTP $http_code:\n\n\`\`\`\n$body\n\`\`\`\n\nRotate at https://crates.io/me and update repo secret."
            exit 1
          fi
          echo "CARGO_REGISTRY_TOKEN_TC OK (crates.io /me HTTP 200)"

      - name: RELEASE_PLEASE_TOKEN_TC — gh auth status
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN_TC }}
        shell: bash
        run: |
          set +e
          out=$(gh auth status 2>&1)
          rc=$?
          if [ $rc -ne 0 ]; then
            # Use default GITHUB_TOKEN to file the issue (since this one is broken).
            GH_TOKEN=${{ secrets.GITHUB_TOKEN }} gh issue create \
              --title "RELEASE_PLEASE_TOKEN_TC failing" \
              --label "ops,P1" \
              --body "Weekly secret-health probe — gh auth status failed:\n\n\`\`\`\n$out\n\`\`\`\n\nRotate the PAT at https://github.com/settings/tokens and update repo secret."
            exit 1
          fi
          echo "RELEASE_PLEASE_TOKEN_TC OK"
