#
# Operator panic-button: deprecate a broken published version across
# all 6 npm packages (root + 5 platforms) + 7 cargo crates.
# npm: marks tarballs deprecated (warns on install).
# cargo: yanks (prevents new resolution of the version).

name: deprecate-version

on:
  workflow_dispatch:
    inputs:
      version:
        required: true
        type: string
        description: "Version to deprecate, e.g. 0.2.0"
      reason:
        required: true
        type: string
        description: "Deprecation message users see on install (e.g., 'broken X, install 0.2.1')"

permissions:
  contents: read

env:
  # Run node20 JS actions on node24 ahead of GitHub's 2026-06-02 cutover.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deprecate-npm:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_TC }}
        shell: bash
        run: |
          # Codex review I5 (2026-05-25): collect failures + fail loud if any
          # deprecate attempt errored. Silent "|| true" succeeded with zero work.
          set -e
          failures=()
          for pkg in \
            terminal-commander \
            @terminal-commander/linux-x64 \
            @terminal-commander/linux-arm64 \
            @terminal-commander/windows-x64 \
            @terminal-commander/mac-x64 \
            @terminal-commander/mac-arm64; do
            echo "── npm deprecate ${pkg}@${{ inputs.version }}"
            if ! npm deprecate "${pkg}@${{ inputs.version }}" "${{ inputs.reason }}"; then
              # 404 (version doesn't exist) is acceptable — it means publish
              # didn't reach this package. Anything else (auth fail, 5xx) is fatal.
              if npm view "${pkg}@${{ inputs.version }}" version >/dev/null 2>&1; then
                # Version exists but deprecate failed → real failure
                failures+=("$pkg")
              else
                echo "::warning::${pkg}@${{ inputs.version }} not on registry (skip)"
              fi
            fi
          done
          if [ ${#failures[@]} -gt 0 ]; then
            echo "::error::deprecation failed for: ${failures[*]}"
            exit 1
          fi

  yank-cargo:
    runs-on: ubuntu-24.04
    steps:
      - uses: dtolnay/rust-toolchain@master
        with: { toolchain: "1.95.0" }
      - env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN_TC }}
        shell: bash
        run: |
          set -e
          failures=()
          for crate in \
            terminal-commander-core \
            terminal-commander-sifters \
            terminal-commander-probes \
            terminal-commander-store \
            terminal-commander-supervisor \
            terminal-commanderd \
            terminal-commander-mcp; do
            echo "── cargo yank ${crate}@${{ inputs.version }}"
            if ! cargo yank --version "${{ inputs.version }}" "$crate"; then
              # crates.io HTTP API confirms whether crate@ver exists
              http_code=$(curl -sS -o /dev/null -w '%{http_code}' \
                -H 'User-Agent: terminal-commander-deprecate (https://github.com/special-place-administrator/terminal-commander)' \
                "https://crates.io/api/v1/crates/${crate}/${{ inputs.version }}")
              if [ "$http_code" = "200" ]; then
                failures+=("$crate")
              else
                echo "::warning::${crate}@${{ inputs.version }} not on crates.io (HTTP $http_code, skip)"
              fi
            fi
          done
          if [ ${#failures[@]} -gt 0 ]; then
            echo "::error::yank failed for: ${failures[*]}"
            exit 1
          fi
