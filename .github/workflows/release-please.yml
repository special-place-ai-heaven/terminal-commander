    name: verify-windows-x64
    needs: [release-context, publish-root]
    if: always() && needs.publish-root.result == 'success'
    runs-on: windows-2022
    permissions: { contents: read, issues: write }
    steps:
      - run: powershell -Command Start-Sleep -Seconds 60
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - shell: pwsh
        env:
          VER: ${{ needs.release-context.outputs.version }}
        run: |
          $ErrorActionPreference = 'Stop'
          npm install -g "terminal-commander@$env:VER"
          terminal-commander-mcp --version
          # Stdio probe: 10s timeout via PowerShell job, Stop-Job + Remove-Job
          # so we don't leak the runspace. Wait-Job returns $null on timeout.
          # Linux + Mac verify treat timeout as pass + non-zero quick exit as fail.
          # Windows must behave the same: only timeout is acceptable; any other
          # non-success state (Failed, fast non-zero exit) must fail loud.
          $msg = '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"smoke","version":"0.0.0"}}}'
          $job = Start-Job -ScriptBlock {
            param($m) $m | terminal-commander-mcp
          } -ArgumentList $msg
          $done = Wait-Job $job -Timeout 10
          $timedOut = ($null -eq $done)
          if ($timedOut) {
            Write-Host "smoke: stdio probe timed out (expected for unbounded server)"
          } else {
            # Job completed within 10s. Receive output + inspect state.
            $output = Receive-Job $job -ErrorAction SilentlyContinue
            if ($output) { $output | ForEach-Object { Write-Host "stdio: $_" } }
            if ($job.State -ne 'Completed') {
              Stop-Job $job -ErrorAction SilentlyContinue
              Remove-Job $job -Force -ErrorAction SilentlyContinue
              throw "verify-windows-x64: MCP exited fast in state '$($job.State)' — install is broken"
            }
          }
          Stop-Job $job -ErrorAction SilentlyContinue
          Remove-Job $job -Force -ErrorAction SilentlyContinue
          Write-Host "verify-windows-x64: OK"

  verify-mac-x64:
    name: verify-mac-x64
    needs: [release-context, publish-root]
    if: always() && needs.publish-root.result == 'success'
    runs-on: macos-15-intel   # Intel — macos-13 retired 2025-12-04; macos-15-intel is the supported Intel image. Keep a runner pinning task in runbook to rotate when GitHub deprecates.
    permissions: { contents: read, issues: write }
    steps:
      - run: sleep 60
      - uses: actions/setup-node@v4
        with: { node-version: "20" }     # 0.2.0 ships without --provenance; Node 20 is fine. Task 23 bumps to 22.14+.
      - env:
          VER: ${{ needs.release-context.outputs.version }}
        run: |
          set -e
          npm install -g "terminal-commander@${VER}"
          terminal-commander-mcp --version
          # Portable timeout via python (always on macOS runner). subprocess.run
          # cleanly terminates the child + reports an explicit timeout, no
          # SIGKILL race, no kill-wait hang. Exit 124 is the conventional
          # "timed out cleanly" code we treat as success for an unbounded
          # stdio server probe.
          python3 - "$@" <<'PY'
          import json, subprocess, sys
          payload = json.dumps({
              "jsonrpc": "2.0", "id": 1, "method": "initialize",
              "params": {
                  "protocolVersion": "2024-11-05",
                  "capabilities": {},
                  "clientInfo": {"name": "smoke", "version": "0.0.0"},
              },
          })
          try:
              r = subprocess.run(
                  ["terminal-commander-mcp"],
                  input=payload, text=True, capture_output=True, timeout=10,
              )
              sys.exit(r.returncode)
          except subprocess.TimeoutExpired:
              print("smoke: stdio probe timed out (expected for unbounded server)")
              sys.exit(0)
          PY
          echo 'verify-mac-x64: OK'

  verify-mac-arm64:
    name: verify-mac-arm64
    needs: [release-context, publish-root]
    if: always() && needs.publish-root.result == 'success'
    runs-on: macos-14   # Apple Silicon
    permissions: { contents: read, issues: write }
    steps:
      - run: sleep 60
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - env:
          VER: ${{ needs.release-context.outputs.version }}
        run: |
          set -e
          npm install -g "terminal-commander@${VER}"
          terminal-commander-mcp --version
          python3 - "$@" <<'PY'
          import json, subprocess, sys
          payload = json.dumps({
              "jsonrpc": "2.0", "id": 1, "method": "initialize",
              "params": {
                  "protocolVersion": "2024-11-05",
                  "capabilities": {},
                  "clientInfo": {"name": "smoke", "version": "0.0.0"},
              },
          })
          try:
              r = subprocess.run(
                  ["terminal-commander-mcp"],
                  input=payload, text=True, capture_output=True, timeout=10,
              )
              sys.exit(r.returncode)
          except subprocess.TimeoutExpired:
              print("smoke: stdio probe timed out (expected for unbounded server)")
              sys.exit(0)
          PY
          echo 'verify-mac-arm64: OK'

  mark-release-broken:
    name: mark-release-broken
    # Fire on control-plane, prepublish, publish, or verification failures.
    # Downstream skips after an earlier failure are expected; the original
    # failing job remains visible in this explicit result set.
    needs:
      - release-context
      - prepublish-gate
      - publish-linux-x64
      - publish-linux-arm64
      - publish-windows-x64
      - publish-mac-x64
      - publish-mac-arm64
      - publish-root
      - publish-cargo-terminal-commander-core
      - publish-cargo-terminal-commander-sifters
      - publish-cargo-terminal-commander-probes
      - publish-cargo-terminal-commander-store
      - publish-cargo-terminal-commander-supervisor
      - publish-cargo-terminal-commander-ipc
      - publish-cargo-terminal-commanderd
      - publish-cargo-terminal-commander-mcp
      - verify-linux-x64
      - verify-linux-arm64
      - verify-windows-x64
      - verify-mac-x64
      - verify-mac-arm64
    if: |
      always() && !cancelled() &&
      (needs.release-context.result == 'failure' ||
       needs.prepublish-gate.result == 'failure' ||
       needs.publish-linux-x64.result == 'failure' ||
       needs.publish-linux-arm64.result == 'failure' ||
       needs.publish-windows-x64.result == 'failure' ||
       needs.publish-mac-x64.result == 'failure' ||
       needs.publish-mac-arm64.result == 'failure' ||
       needs.publish-root.result == 'failure' ||
       needs.publish-cargo-terminal-commander-core.result == 'failure' ||
       needs.publish-cargo-terminal-commander-sifters.result == 'failure' ||
       needs.publish-cargo-terminal-commander-probes.result == 'failure' ||
       needs.publish-cargo-terminal-commander-store.result == 'failure' ||
       needs.publish-cargo-terminal-commander-supervisor.result == 'failure' ||
       needs.publish-cargo-terminal-commander-ipc.result == 'failure' ||
       needs.publish-cargo-terminal-commanderd.result == 'failure' ||
       needs.publish-cargo-terminal-commander-mcp.result == 'failure' ||
       needs.verify-linux-x64.result == 'failure' ||
       needs.verify-linux-arm64.result == 'failure' ||
       needs.verify-windows-x64.result == 'failure' ||
       needs.verify-mac-x64.result == 'failure' ||
       needs.verify-mac-arm64.result == 'failure')
    runs-on: ubuntu-24.04
    permissions: { issues: write, contents: read }
    steps:
      - name: Compose issue body to a file (avoids YAML heredoc fragility)
        env:
          VER: ${{ needs.release-context.outputs.version }}
          RELEASE_ID: ${{ needs.release-context.outputs.version || github.sha }}
          RELEASE_CONTEXT: ${{ needs.release-context.result }}
          PREPUBLISH_GATE: ${{ needs.prepublish-gate.result }}
          # Publish job results
          PUB_LX64: ${{ needs.publish-linux-x64.result }}
          PUB_LARM: ${{ needs.publish-linux-arm64.result }}
          PUB_WIN:  ${{ needs.publish-windows-x64.result }}
          PUB_MX64: ${{ needs.publish-mac-x64.result }}
          PUB_MARM: ${{ needs.publish-mac-arm64.result }}
          PUB_ROOT: ${{ needs.publish-root.result }}
          PUB_CORE: ${{ needs.publish-cargo-terminal-commander-core.result }}
          PUB_SIFTERS: ${{ needs.publish-cargo-terminal-commander-sifters.result }}
          PUB_PROBES: ${{ needs.publish-cargo-terminal-commander-probes.result }}
          PUB_STORE: ${{ needs.publish-cargo-terminal-commander-store.result }}
          PUB_SUPERVISOR: ${{ needs.publish-cargo-terminal-commander-supervisor.result }}
          PUB_IPC: ${{ needs.publish-cargo-terminal-commander-ipc.result }}
          PUB_DAEMON: ${{ needs.publish-cargo-terminal-commanderd.result }}
          PUB_MCP: ${{ needs.publish-cargo-terminal-commander-mcp.result }}
          # Verify job results
          RES_LX64: ${{ needs.verify-linux-x64.result }}
          RES_LARM: ${{ needs.verify-linux-arm64.result }}
          RES_WIN:  ${{ needs.verify-windows-x64.result }}
          RES_MX64: ${{ needs.verify-mac-x64.result }}
          RES_MARM: ${{ needs.verify-mac-arm64.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -e
          # printf, NOT heredoc — heredoc indentation + GH-Actions YAML is fragile.
          # `printf --` ends option parsing so a format string starting
          # with `-` (e.g. `- linux-x64 : %s`) is NOT mistaken for a flag.
          # Without it, bash's builtin printf fails with
          # `printf: - : invalid option` and, under `set -e`, aborts this
          # step — so the broken-release issue was never filed. Values are
          # always injected via `%s` (never used as the format), so a value
          # like `-` or an empty `$VER` is rendered literally and safely.
          printf -- 'Release **%s** failed somewhere in the publish pipeline.\n\n' "$RELEASE_ID" > /tmp/body.md
          printf -- 'Control plane:\n' >> /tmp/body.md
          printf -- '- release-context : %s\n' "$RELEASE_CONTEXT" >> /tmp/body.md
          printf -- '- prepublish-gate : %s\n\n' "$PREPUBLISH_GATE" >> /tmp/body.md
          printf -- 'NPM publish:\n' >> /tmp/body.md
          printf -- '- linux-x64   : %s\n' "$PUB_LX64"  >> /tmp/body.md
          printf -- '- linux-arm64 : %s\n' "$PUB_LARM"  >> /tmp/body.md
          printf -- '- windows-x64 : %s\n' "$PUB_WIN"   >> /tmp/body.md
          printf -- '- mac-x64     : %s\n' "$PUB_MX64"  >> /tmp/body.md
          printf -- '- mac-arm64   : %s\n' "$PUB_MARM"  >> /tmp/body.md
          printf -- '- root        : %s\n\n' "$PUB_ROOT" >> /tmp/body.md
          printf -- 'Cargo publish:\n' >> /tmp/body.md
          printf -- '- core        : %s\n' "$PUB_CORE" >> /tmp/body.md
          printf -- '- sifters     : %s\n' "$PUB_SIFTERS" >> /tmp/body.md
          printf -- '- probes      : %s\n' "$PUB_PROBES" >> /tmp/body.md
          printf -- '- store       : %s\n' "$PUB_STORE" >> /tmp/body.md
          printf -- '- supervisor  : %s\n' "$PUB_SUPERVISOR" >> /tmp/body.md
          printf -- '- ipc         : %s\n' "$PUB_IPC" >> /tmp/body.md
          printf -- '- daemon      : %s\n' "$PUB_DAEMON" >> /tmp/body.md
          printf -- '- mcp         : %s\n\n' "$PUB_MCP" >> /tmp/body.md
          printf -- 'Post-publish verify:\n' >> /tmp/body.md
          printf -- '- linux-x64   : %s\n' "$RES_LX64"  >> /tmp/body.md
          printf -- '- linux-arm64 : %s\n' "$RES_LARM"  >> /tmp/body.md
          printf -- '- windows-x64 : %s\n' "$RES_WIN"   >> /tmp/body.md
          printf -- '- mac-x64     : %s\n' "$RES_MX64"  >> /tmp/body.md
          printf -- '- mac-arm64   : %s\n\n' "$RES_MARM" >> /tmp/body.md
          printf -- '**Action required:**\n' >> /tmp/body.md
          if [[ "$VER" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            printf -- '1. Run `bash scripts/release/recover-partial-publish.sh %s` to identify missing artifacts.\n' "$VER" >> /tmp/body.md
            printf -- '2. If some packages shipped + some failed: re-run release-please.yml with `force_publish: true` (the E409-tolerant pattern republishes only missing).\n' >> /tmp/body.md
            printf -- '3. If a published version is broken: run `.github/workflows/deprecate-version.yml` for version %s, then patch release.\n\n' "$VER" >> /tmp/body.md
          else
            printf -- '1. Repair the release-context failure before attempting any publish recovery.\n\n' >> /tmp/body.md
          fi
          printf -- 'Workflow run: %s\n' "$RUN_URL" >> /tmp/body.md
      - name: Open P0 issue (PAT first, fall back to GITHUB_TOKEN if PAT is the broken one)
        env:
          PAT: ${{ secrets.RELEASE_PLEASE_TOKEN_TC }}
          GITHUB_TOKEN_FALLBACK: ${{ secrets.GITHUB_TOKEN }}
          VER: ${{ needs.release-context.outputs.version }}
          RELEASE_ID: ${{ needs.release-context.outputs.version || github.sha }}
        run: |
          set -e
          title="release ${RELEASE_ID} pipeline FAILED"
          open_or_update_issue() {
            local token="$1"
            local existing
            existing=$(TITLE="$title" GH_TOKEN="$token" gh issue list --repo "$GITHUB_REPOSITORY" --state open --label "release-broken" --limit 100 --json number,title --jq '[.[] | select(.title == env.TITLE)][0].number // empty')
            if [ -n "$existing" ]; then
              GH_TOKEN="$token" gh issue edit "$existing" --repo "$GITHUB_REPOSITORY" --body-file /tmp/body.md
            else
              GH_TOKEN="$token" gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" --label "release-broken,P0" --body-file /tmp/body.md
            fi
          }
          # Try PAT first.
          if open_or_update_issue "$PAT"; then
            echo "issue filed via RELEASE_PLEASE_TOKEN_TC"
            exit 0
          fi
          echo "::warning::RELEASE_PLEASE_TOKEN_TC failed to open issue; falling back to GITHUB_TOKEN"
          open_or_update_issue "$GITHUB_TOKEN_FALLBACK"
