#
# release-please + npm trusted publishing (NPM06 + NPM07).
#
# NPM06 portion:
#   On every push to `main`, run release-please in manifest mode so
#   Conventional Commits drive a single shared-version release PR
#   across the three npm packages:
#     - packages/terminal-commander           (root wrapper)
#     - packages/terminal-commander-linux-x64 (@terminal-commander/linux-x64)
#     - packages/terminal-commander-linux-arm64 (@terminal-commander/linux-arm64)
#
#   The release PR carries the version bump on each `package.json`
#   plus a CHANGELOG entry. When (and only when) the operator merges
#   the release PR, release-please creates the GitHub Release and
#   the matching `v<version>` tag on the SAME workflow run (because
#   the merge commit triggers `push: main`).
#
# NPM07 portion (publish jobs):
#   When release-please reports `releases_created == 'true'`, three
#   downstream jobs run on the same workflow invocation:
#     1. publish-linux-x64   — builds `@terminal-commander/linux-x64`
#                              binaries and `npm publish` (dist-tag latest).
#     2. publish-linux-arm64 — builds `@terminal-commander/linux-arm64`
#                              binaries and `npm publish`.
#     3. publish-root        — depends on the two platform jobs above;
#                              `npm publish` for the root wrapper (latest).
#                              `terminal-commander` wrapper.
#   First npm publish uses `secrets.NPM_TOKEN_TC` via
#   `NODE_AUTH_TOKEN` (trusted-publisher OIDC not yet configured on
#   npmjs.com for all three package names). No `CARGO_REGISTRY_TOKEN`,
#   release-please job uses `RELEASE_PLEASE_TOKEN_TC` when
#   `GITHUB_TOKEN` cannot open/update the release PR (Bad credentials).
#
# This workflow does NOT:
#   - reference any long-lived secret (NPM_TOKEN, NPM_TOKEN_TC,
#     CARGO_REGISTRY_TOKEN_TC, RELEASE_PLEASE_TOKEN_TC),
#   - publish to crates.io,
#   - call the NPM05 `npm-binary-build` workflow (kept separate as a
#     non-publishing CI gate),
#   - auto-merge the release PR (release-pr-sync.yml; feat/fix only),
#   - touch `crates/**`, `Cargo.toml`, `Cargo.lock`, or `scripts/**`,
#   - request `id-token: write` (OIDC may return after trusted
#     publisher is configured on npmjs.com for all three names).
#
# Action pin doctrine (NPM06):
#   `googleapis/release-please-action` is pinned to immutable commit
#   SHA `5c625bfb5d1ff62eadeeb3772007f7f66fdcf071`, which resolves to
#   tag `v4.4.1` (the most recent v4 patch on 2026-05-23). v4 is
#   chosen over v5 because the manifest-mode shape used in this
#   chain matches the v4 README and the Symforge precedent.
#
# Binary-source decision (NPM07):
#   The publish jobs build the three Rust release binaries INLINE
#   (from the merge-commit checkout of `main`, which is the same SHA
#   that release-please tagged). The publish workflow does NOT
#   download artifacts from the `npm-binary-build` workflow; that
#   keeps the npm provenance attestation tied to THIS workflow's
#   build steps and avoids cross-workflow artifact-retention
#   coupling. `npm-binary-build` remains an independent CI gate
#   that runs on every push and never publishes.

name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      recovery_release_as:
        description: "Recovery only — create GitHub release for this version (skips opening a release PR)"
        required: false
        type: string
      force_publish:
        description: "Recovery only — run npm publish jobs for the manifest version (after release PR merge/tag stall)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

env:
  RUST_TOOLCHAIN: "1.95.0"
  NODE_VERSION: "20"

jobs:
  # ----------------------------------------------------------------
  # JOB 1 — release-please (NPM06).
  #
  # Owns the release PR + tag/Release surface. Needs `contents: write`
  # to push version bumps + CHANGELOG into the release PR, and
  # `pull-requests: write` to open / update that PR. No id-token.
  # ----------------------------------------------------------------
  release-please:
    name: release-please
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.final.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released || steps.release_retry.outputs.paths_released }}
      tag_name: ${{ steps.final.outputs.tag_name }}
      version: ${{ steps.final.outputs.version }}
    steps:
      - name: release-please (manifest mode)
        id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071
        with:
          # Manifest mode: both files live under .github/ per the
          # NPM02 contract §7 + §10. Paths are relative to the repo
          # root because release-please-action resolves them from
          # `GITHUB_WORKSPACE` after checking out the repo internally.
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
          token: ${{ secrets.RELEASE_PLEASE_TOKEN_TC }}
          release-as: ${{ inputs.recovery_release_as }}
          skip-github-pull-request: ${{ inputs.recovery_release_as != '' }}

      # Merged release PRs often keep autorelease:pending when the custom
      # title pattern omitted ${version}; that blocks all future releases.
      - name: Clear stale autorelease labels on merged release PRs
        if: >-
          steps.release.outputs.releases_created != 'true' &&
          github.event_name == 'push' &&
          inputs.recovery_release_as == ''
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN_TC }}
        run: |
          set -euo pipefail
          mapfile -t prs < <(gh pr list --state merged --label "autorelease: pending" --json number --jq '.[].number')
          for n in "${prs[@]}"; do
            gh pr edit "$n" --remove-label "autorelease: pending"
            echo "cleared autorelease:pending on PR #${n}"
          done

      # Second pass: after merge, release-please often needs another run to
      # create the tag/GitHub Release (googleapis/release-please#2028).
      - name: release-please tag retry (post-merge)
        id: release_retry
        if: >-
          steps.release.outputs.releases_created != 'true' &&
          github.event_name == 'push' &&
          inputs.recovery_release_as == ''
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
          token: ${{ secrets.RELEASE_PLEASE_TOKEN_TC }}
          skip-github-pull-request: true

      - name: Aggregate release-please outputs
        id: final
        shell: bash
        run: |
          set -euo pipefail
          created="${{ steps.release.outputs.releases_created }}"
          retry="${{ steps.release_retry.outputs.releases_created }}"
          if [ "$created" = "true" ] || [ "$retry" = "true" ]; then
            echo "releases_created=true" >> "$GITHUB_OUTPUT"
          else
            echo "releases_created=false" >> "$GITHUB_OUTPUT"
          fi
          ver="${{ steps.release.outputs['packages/terminal-commander--version'] }}"
          if [ -z "$ver" ]; then
            ver="${{ steps.release_retry.outputs['packages/terminal-commander--version'] }}"
          fi
          echo "version=${ver}" >> "$GITHUB_OUTPUT"
          tag="${{ steps.release.outputs['packages/terminal-commander--tag_name'] }}"
          if [ -z "$tag" ]; then
            tag="${{ steps.release_retry.outputs['packages/terminal-commander--tag_name'] }}"
          fi
          echo "tag_name=${tag}" >> "$GITHUB_OUTPUT"

  # After auto-merged release PRs, release-please sometimes skips tag/npm.
  # Close the loop without workflow_dispatch / manual force_publish.
  ensure-release:
    name: ensure-release
    needs: release-please
    if: github.event_name == 'push' && inputs.recovery_release_as == ''
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      publish: ${{ steps.ensure.outputs.publish }}
      version: ${{ steps.ensure.outputs.version }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"

      - name: Ensure tag, GitHub release, and npm publish gap
        id: ensure
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN_TC }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_TC }}
        run: bash scripts/release/ensure-release-complete.sh

      - name: release-please finalize (missing tag only)
        if: steps.ensure.outputs.need_release_please == 'true'
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
          token: ${{ secrets.RELEASE_PLEASE_TOKEN_TC }}
          skip-github-pull-request: true

  # Recovery gate: workflow_dispatch force_publish (manual recovery only).
  publish-version:
    name: publish-version
    if: github.event_name == 'workflow_dispatch' && inputs.force_publish == true
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.manifest.outputs.version }}
      publish: "true"
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Read manifest version
        id: manifest
        shell: bash
        run: |
          set -e
          version=$(node -p "require('./.github/.release-please-manifest.json')['packages/terminal-commander']")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "publish-version: $version"

  # ----------------------------------------------------------------
  # JOBS 2-11 — platform build + publish (NPM07).
  #
  # For each of the 5 platforms (linux-x64, linux-arm64, windows-x64,
  # mac-x64, mac-arm64) there is a pair of jobs:
  #
  #   build-<platform>   — calls reusable `_build-platform-binary.yml`
  #                        which compiles the 3 Rust binaries on the
  #                        appropriate native runner, stages them into
  #                        the platform package's bin/ dir, tars to
  #                        preserve the +x bit, and uploads the tar as
  #                        a `tc-bin-<platform>` artifact.
  #
  #   publish-<platform> — downloads the bin.tar artifact on a small
  #                        ubuntu-24.04 runner, extracts it (restoring
  #                        the executable bit), validates the package
  #                        version against release-please's output, and
  #                        runs `npm publish --access public` against
  #                        `@terminal-commander/<platform>`.
  #
  # 0.2.0 token-mode auth: NODE_AUTH_TOKEN: secrets.NPM_TOKEN_TC.
  # No `--provenance`, no `id-token: write`, no Node 22.14. Task 23
  # owns the OIDC cutover after operator one-time UI setup on
  # npmjs.com (trusted publishers).
  #
  # Drift-proof: every platform binary build flows through the single
  # reusable workflow `_build-platform-binary.yml`, the same workflow
  # called by the PR-time `npm-binary-build.yml` CI gate. Same source
  # of truth for both PR validation and release-time publish.
  # ----------------------------------------------------------------

  # ---------- linux-x64 ----------
  build-linux-x64:
    needs:
      - release-please
      - ensure-release
      - publish-version
    if: >-
      always() && !cancelled() &&
      (needs.release-please.outputs.releases_created == 'true' ||
      (needs.ensure-release.result == 'success' && needs.ensure-release.outputs.publish == 'true') ||
      needs.publish-version.outputs.publish == 'true')
    uses: ./.github/workflows/_build-platform-binary.yml
    with:
      platform: linux-x64
      upload_artifact: true

  publish-linux-x64:
    name: publish-linux-x64
    needs:
      - release-please
      - ensure-release
      - publish-version
      - build-linux-x64
    if: >-
      always() && !cancelled() &&
      needs.build-linux-x64.result == 'success' &&
      (needs.release-please.outputs.releases_created == 'true' ||
      (needs.ensure-release.result == 'success' && needs.ensure-release.outputs.publish == 'true') ||
      needs.publish-version.outputs.publish == 'true')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout (released SHA on main)
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }} with npm registry
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"

      - name: Download bin.tar artifact
        uses: actions/download-artifact@v4
        with:
          name: tc-bin-linux-x64
          path: packages/terminal-commander-linux-x64/

      - name: Extract bin.tar (preserves +x mode)
        shell: bash
        run: |
          set -euo pipefail
          cd packages/terminal-commander-linux-x64
          rm -rf bin
          tar -xf bin.tar
          rm bin.tar
          ls -la bin/

      - name: Confirm package version matches release-please output
        shell: bash
        env:
          EXPECTED_VERSION: ${{ needs.release-please.outputs.version || needs.ensure-release.outputs.version || needs.publish-version.outputs.version }}
        run: |
          set -e
          actual=$(node -p "require('./packages/terminal-commander-linux-x64/package.json').version")
          if [ "$actual" != "$EXPECTED_VERSION" ]; then
            echo "::error::version mismatch: package.json=$actual release-please=$EXPECTED_VERSION"
            exit 1
          fi
          echo "version-match: $actual"

      - name: npm publish --access public (NPM_TOKEN_TC for 0.2.0; OIDC + --provenance at Task 23)
        shell: bash
        working-directory: packages/terminal-commander-linux-x64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_TC }}
        run: |
          set -e
          if npm publish --access public; then
            exit 0
          fi
          # Recovery: workflow_dispatch + force_publish + already-on-registry → exit 0.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_publish }}" = "true" ]; then
            ver=$(node -p "require('./package.json').version")
            name=$(node -p "require('./package.json').name")
            if npm view "${name}@${ver}" version >/dev/null 2>&1; then
              echo "::warning::${name}@${ver} already on registry (force_publish recovery)"
              exit 0
            fi
          fi
          exit 1

  # ---------- linux-arm64 ----------
  build-linux-arm64:
    needs:
      - release-please
      - ensure-release
      - publish-version
    if: >-
      always() && !cancelled() &&
      (needs.release-please.outputs.releases_created == 'true' ||
      (needs.ensure-release.result == 'success' && needs.ensure-release.outputs.publish == 'true') ||
      needs.publish-version.outputs.publish == 'true')
    uses: ./.github/workflows/_build-platform-binary.yml
    with:
      platform: linux-arm64
      upload_artifact: true

  publish-linux-arm64:
    name: publish-linux-arm64
    needs:
      - release-please
      - ensure-release
      - publish-version
      - build-linux-arm64
    if: >-
      always() && !cancelled() &&
      needs.build-linux-arm64.result == 'success' &&
      (needs.release-please.outputs.releases_created == 'true' ||
      (needs.ensure-release.result == 'success' && needs.ensure-release.outputs.publish == 'true') ||
      needs.publish-version.outputs.publish == 'true')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout (released SHA on main)
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }} with npm registry
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"

      - name: Download bin.tar artifact
        uses: actions/download-artifact@v4
        with:
          name: tc-bin-linux-arm64
          path: packages/terminal-commander-linux-arm64/

      - name: Extract bin.tar (preserves +x mode)
        shell: bash
        run: |
          set -euo pipefail
          cd packages/terminal-commander-linux-arm64
          rm -rf bin
          tar -xf bin.tar
          rm bin.tar
          ls -la bin/

      - name: Confirm package version matches release-please output
        shell: bash
        env:
          EXPECTED_VERSION: ${{ needs.release-please.outputs.version || needs.ensure-release.outputs.version || needs.publish-version.outputs.version }}
        run: |
          set -e
          actual=$(node -p "require('./packages/terminal-commander-linux-arm64/package.json').version")
          if [ "$actual" != "$EXPECTED_VERSION" ]; then
            echo "::error::version mismatch: package.json=$actual release-please=$EXPECTED_VERSION"
            exit 1
          fi
          echo "version-match: $actual"

      - name: npm publish --access public (NPM_TOKEN_TC for 0.2.0; OIDC + --provenance at Task 23)
        shell: bash
        working-directory: packages/terminal-commander-linux-arm64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_TC }}
        run: |
          set -e
          if npm publish --access public; then
            exit 0
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_publish }}" = "true" ]; then
            ver=$(node -p "require('./package.json').version")
            name=$(node -p "require('./package.json').name")
            if npm view "${name}@${ver}" version >/dev/null 2>&1; then
              echo "::warning::${name}@${ver} already on registry (force_publish recovery)"
              exit 0
            fi
          fi
          exit 1

  # ---------- windows-x64 ----------
  build-windows-x64:
    needs:
      - release-please
      - ensure-release
      - publish-version
    if: >-
      always() && !cancelled() &&
      (needs.release-please.outputs.releases_created == 'true' ||
      (needs.ensure-release.result == 'success' && needs.ensure-release.outputs.publish == 'true') ||
      needs.publish-version.outputs.publish == 'true')
    uses: ./.github/workflows/_build-platform-binary.yml
    with:
      platform: windows-x64
      upload_artifact: true

  publish-windows-x64:
    name: publish-windows-x64
    needs:
      - release-please
      - ensure-release
      - publish-version
      - build-windows-x64
    if: >-
      always() && !cancelled() &&
      needs.build-windows-x64.result == 'success' &&
      (needs.release-please.outputs.releases_created == 'true' ||
      (needs.ensure-release.result == 'success' && needs.ensure-release.outputs.publish == 'true') ||
      needs.publish-version.outputs.publish == 'true')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout (released SHA on main)
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }} with npm registry
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"

      - name: Download bin.tar artifact
        uses: actions/download-artifact@v4
        with:
          name: tc-bin-windows-x64
          path: packages/terminal-commander-windows-x64/

      - name: Extract bin.tar (preserves +x mode)
        shell: bash
        run: |
          set -euo pipefail
          cd packages/terminal-commander-windows-x64
          rm -rf bin
          tar -xf bin.tar
          rm bin.tar
          ls -la bin/

      - name: Confirm package version matches release-please output
        shell: bash
        env:
          EXPECTED_VERSION: ${{ needs.release-please.outputs.version || needs.ensure-release.outputs.version || needs.publish-version.outputs.version }}
        run: |
          set -e
          actual=$(node -p "require('./packages/terminal-commander-windows-x64/package.json').version")
          if [ "$actual" != "$EXPECTED_VERSION" ]; then
            echo "::error::version mismatch: package.json=$actual release-please=$EXPECTED_VERSION"
            exit 1
          fi
          echo "version-match: $actual"

      - name: npm publish --access public (NPM_TOKEN_TC for 0.2.0; OIDC + --provenance at Task 23)
        shell: bash
        working-directory: packages/terminal-commander-windows-x64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_TC }}
        run: |
          set -e
          if npm publish --access public; then
            exit 0
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_publish }}" = "true" ]; then
            ver=$(node -p "require('./package.json').version")
            name=$(node -p "require('./package.json').name")
            if npm view "${name}@${ver}" version >/dev/null 2>&1; then
              echo "::warning::${name}@${ver} already on registry (force_publish recovery)"
              exit 0
            fi
          fi
          exit 1

  # ---------- mac-x64 ----------
  build-mac-x64:
    needs:
      - release-please
      - ensure-release
      - publish-version
    if: >-
      always() && !cancelled() &&
      (needs.release-please.outputs.releases_created == 'true' ||
      (needs.ensure-release.result == 'success' && needs.ensure-release.outputs.publish == 'true') ||
      needs.publish-version.outputs.publish == 'true')
    uses: ./.github/workflows/_build-platform-binary.yml
    with:
      platform: mac-x64
      upload_artifact: true

  publish-mac-x64:
    name: publish-mac-x64
    needs:
      - release-please
      - ensure-release
      - publish-version
      - build-mac-x64
    if: >-
      always() && !cancelled() &&
      needs.build-mac-x64.result == 'success' &&
      (needs.release-please.outputs.releases_created == 'true' ||
      (needs.ensure-release.result == 'success' && needs.ensure-release.outputs.publish == 'true') ||
      needs.publish-version.outputs.publish == 'true')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout (released SHA on main)
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }} with npm registry
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"

      - name: Download bin.tar artifact
        uses: actions/download-artifact@v4
        with:
          name: tc-bin-mac-x64
          path: packages/terminal-commander-mac-x64/

      - name: Extract bin.tar (preserves +x mode)
        shell: bash
        run: |
          set -euo pipefail
          cd packages/terminal-commander-mac-x64
          rm -rf bin
          tar -xf bin.tar
          rm bin.tar
          ls -la bin/

      - name: Confirm package version matches release-please output
        shell: bash
        env:
          EXPECTED_VERSION: ${{ needs.release-please.outputs.version || needs.ensure-release.outputs.version || needs.publish-version.outputs.version }}
        run: |
          set -e
          actual=$(node -p "require('./packages/terminal-commander-mac-x64/package.json').version")
          if [ "$actual" != "$EXPECTED_VERSION" ]; then
            echo "::error::version mismatch: package.json=$actual release-please=$EXPECTED_VERSION"
            exit 1
          fi
          echo "version-match: $actual"

      - name: npm publish --access public (NPM_TOKEN_TC for 0.2.0; OIDC + --provenance at Task 23)
        shell: bash
        working-directory: packages/terminal-commander-mac-x64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_TC }}
        run: |
          set -e
          if npm publish --access public; then
            exit 0
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_publish }}" = "true" ]; then
            ver=$(node -p "require('./package.json').version")
            name=$(node -p "require('./package.json').name")
            if npm view "${name}@${ver}" version >/dev/null 2>&1; then
              echo "::warning::${name}@${ver} already on registry (force_publish recovery)"
              exit 0
            fi
          fi
          exit 1

  # ---------- mac-arm64 ----------
  build-mac-arm64:
    needs:
      - release-please
      - ensure-release
      - publish-version
    if: >-
      always() && !cancelled() &&
      (needs.release-please.outputs.releases_created == 'true' ||
      (needs.ensure-release.result == 'success' && needs.ensure-release.outputs.publish == 'true') ||
      needs.publish-version.outputs.publish == 'true')
    uses: ./.github/workflows/_build-platform-binary.yml
    with:
      platform: mac-arm64
      upload_artifact: true

  publish-mac-arm64:
    name: publish-mac-arm64
    needs:
      - release-please
      - ensure-release
      - publish-version
      - build-mac-arm64
    if: >-
      always() && !cancelled() &&
      needs.build-mac-arm64.result == 'success' &&
      (needs.release-please.outputs.releases_created == 'true' ||
      (needs.ensure-release.result == 'success' && needs.ensure-release.outputs.publish == 'true') ||
      needs.publish-version.outputs.publish == 'true')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout (released SHA on main)
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }} with npm registry
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"

      - name: Download bin.tar artifact
        uses: actions/download-artifact@v4
        with:
          name: tc-bin-mac-arm64
          path: packages/terminal-commander-mac-arm64/

      - name: Extract bin.tar (preserves +x mode)
        shell: bash
        run: |
          set -euo pipefail
          cd packages/terminal-commander-mac-arm64
          rm -rf bin
          tar -xf bin.tar
          rm bin.tar
          ls -la bin/

      - name: Confirm package version matches release-please output
        shell: bash
        env:
          EXPECTED_VERSION: ${{ needs.release-please.outputs.version || needs.ensure-release.outputs.version || needs.publish-version.outputs.version }}
        run: |
          set -e
          actual=$(node -p "require('./packages/terminal-commander-mac-arm64/package.json').version")
          if [ "$actual" != "$EXPECTED_VERSION" ]; then
            echo "::error::version mismatch: package.json=$actual release-please=$EXPECTED_VERSION"
            exit 1
          fi
          echo "version-match: $actual"

      - name: npm publish --access public (NPM_TOKEN_TC for 0.2.0; OIDC + --provenance at Task 23)
        shell: bash
        working-directory: packages/terminal-commander-mac-arm64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_TC }}
        run: |
          set -e
          if npm publish --access public; then
            exit 0
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_publish }}" = "true" ]; then
            ver=$(node -p "require('./package.json').version")
            name=$(node -p "require('./package.json').name")
            if npm view "${name}@${ver}" version >/dev/null 2>&1; then
              echo "::warning::${name}@${ver} already on registry (force_publish recovery)"
              exit 0
            fi
          fi
          exit 1

  # ----------------------------------------------------------------
  # JOB 12 — publish-root (NPM07).
  #
  # Depends on ALL 5 platform publishes succeeding. Only then does the
  # root wrapper publish; its `optionalDependencies` pin the exact
  # platform-package versions, so publishing the root before the
  # platform packages would resolve to a non-existent dep.
  #
  # The root package has no Rust binaries to build; the `bin/` shims
  # and `lib/resolve-binary.js` are already in the working tree.
  #
  # Auth: stays on NODE_AUTH_TOKEN + Node 20 for 0.2.0. Task 23 owns
  # the OIDC + --provenance cutover once npmjs.com trusted-publisher
  # UI setup is complete for all 6 npm package names.
  # ----------------------------------------------------------------
  publish-root:
    name: publish-root
    needs:
      - release-please
      - ensure-release
      - publish-version
      - publish-linux-x64
      - publish-linux-arm64
      - publish-windows-x64
      - publish-mac-x64
      - publish-mac-arm64
    if: >-
      always() && !cancelled() &&
      (needs.release-please.outputs.releases_created == 'true' ||
      (needs.ensure-release.result == 'success' && needs.ensure-release.outputs.publish == 'true') ||
      needs.publish-version.outputs.publish == 'true') &&
      needs.publish-linux-x64.result == 'success' &&
      needs.publish-linux-arm64.result == 'success' &&
      needs.publish-windows-x64.result == 'success' &&
      needs.publish-mac-x64.result == 'success' &&
      needs.publish-mac-arm64.result == 'success'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout (released SHA on main)
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }} with npm registry
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"

      - name: Run resolver unit tests (root wrapper)
        shell: bash
        working-directory: packages/terminal-commander
        run: |
          npm test

      - name: Sync optionalDependencies to package version
        shell: bash
        run: |
          node scripts/release/sync-optional-dependencies.js
          node scripts/release/verify-optional-dependencies.js

      - name: Confirm package version + optionalDependencies sync
        shell: bash
        working-directory: packages/terminal-commander
        env:
          EXPECTED_VERSION: ${{ needs.release-please.outputs.version || needs.ensure-release.outputs.version || needs.publish-version.outputs.version }}
        run: |
          set -e
          node <<'NODE'
          const pkg = require('./package.json');
          const expected = process.env.EXPECTED_VERSION;
          if (pkg.version !== expected) {
            console.error(`version mismatch: ${pkg.version} != ${expected}`);
            process.exit(1);
          }
          const deps = pkg.optionalDependencies || {};
          const { PLATFORM_PACKAGES } = require('../../scripts/release/platform-packages.js');
          for (const name of PLATFORM_PACKAGES) {
            if (deps[name] !== expected) {
              console.error(`${name} optionalDependency = ${deps[name]} != ${expected}`);
              process.exit(1);
            }
          }
          console.log(`version-match: ${pkg.version}`);
          console.log(`deps-exact-pin: ok`);
          NODE

      - name: npm publish
        shell: bash
        working-directory: packages/terminal-commander
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_TC }}
        run: |
          npm publish
