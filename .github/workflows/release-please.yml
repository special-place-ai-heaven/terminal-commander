  # ----------------------------------------------------------------
  # ROOT PACKAGE — publish-root (NPM07).
  #
  # Depends on ALL 5 platform publishes succeeding. Only then does the
  # root wrapper publish; its `optionalDependencies` pin the exact
  # platform-package versions, so publishing the root before the
  # platform packages would resolve to a non-existent dep.
  #
  # The root package has no Rust binaries to build; the `bin/` shims
  # and `lib/resolve-binary.js` are already in the working tree.
  #
  # Auth: stays on NODE_AUTH_TOKEN + Node 20 for 0.2.0. Task 23 owns
  # the OIDC + --provenance cutover once npmjs.com trusted-publisher
  # UI setup is complete for all 6 npm package names.
  # ----------------------------------------------------------------
  publish-root:
    name: publish-root
    needs:
      - release-context
      - publish-linux-x64
      - publish-linux-arm64
      - publish-windows-x64
      - publish-mac-x64
      - publish-mac-arm64
    if: >-
      always() && !cancelled() &&
      needs.release-context.outputs.publish == 'true' &&
      needs.publish-linux-x64.result == 'success' &&
      needs.publish-linux-arm64.result == 'success' &&
      needs.publish-windows-x64.result == 'success' &&
      needs.publish-mac-x64.result == 'success' &&
      needs.publish-mac-arm64.result == 'success'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout (released SHA on main)
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }} with npm registry
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"

      - name: Confirm package version + optionalDependencies sync
        shell: bash
        working-directory: packages/terminal-commander
        env:
          EXPECTED_VERSION: ${{ needs.release-context.outputs.version }}
        run: |
          set -e
          node <<'NODE'
          const pkg = require('./package.json');
          const expected = process.env.EXPECTED_VERSION;
          if (pkg.version !== expected) {
            console.error(`version mismatch: ${pkg.version} != ${expected}`);
            process.exit(1);
          }
          const deps = pkg.optionalDependencies || {};
          const { PLATFORM_PACKAGES } = require('../../scripts/release/platform-packages.js');
          for (const name of PLATFORM_PACKAGES) {
            if (deps[name] !== expected) {
              console.error(`${name} optionalDependency = ${deps[name]} != ${expected}`);
              process.exit(1);
            }
          }
          console.log(`version-match: ${pkg.version}`);
          console.log(`deps-exact-pin: ok`);
          NODE

      - name: npm publish
        shell: bash
        working-directory: packages/terminal-commander
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_TC }}
        run: |
          set -e
          if npm publish; then
            exit 0
          fi
          # Recovery: workflow_dispatch + force_publish + already-on-registry → exit 0
          # so cargo publish chain (which depends on publish-root success) can still run.
          # Without this, a re-run after root already published would E409 + block cargo.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_publish }}" = "true" ]; then
            ver=$(node -p "require('./package.json').version")
            name=$(node -p "require('./package.json').name")
            if npm view "${name}@${ver}" version >/dev/null 2>&1; then
              echo "::warning::${name}@${ver} already on registry (force_publish recovery — letting cargo chain proceed)"
              exit 0
            fi
          fi
          exit 1

  # ----------------------------------------------------------------
  # CARGO PACKAGES — 8 crates in strict dependency order.
  #
  # Dep order is non-negotiable: each crate's path-deps must already
  # be on the registry when its tarball is uploaded, or cargo rejects
  # the publish. Order:
  #   core → sifters → probes → store → supervisor → daemon → mcp
  #
  # 0.2.0 token-mode auth: CARGO_REGISTRY_TOKEN: secrets.CARGO_REGISTRY_TOKEN_TC.
  # No OIDC, no id-token: write. Task 23 owns the OIDC cutover after
  # operator one-time UI setup on crates.io (trusted publishers).
  #
  # Each job waits 60s after publish for crates.io index propagation
  # so the next crate's resolver sees the freshly-published prior.
  #
  # Recovery branch (workflow_dispatch + force_publish): on publish
  # failure, query crates.io HTTP API (deterministic JSON) — if the
  # crate version already exists (HTTP 200) treat as success.
  # ----------------------------------------------------------------

  # ---------- terminal-commander-core ----------
  publish-cargo-terminal-commander-core:
    name: publish-cargo-terminal-commander-core
