# Copyright 2026 The Terminal Commander Authors
#
# release-please + npm trusted publishing (NPM06 + NPM07).
#
# NPM06 portion:
#   On every push to `main`, run release-please in manifest mode so
#   Conventional Commits drive a single shared-version release PR
#   across the six npm packages:
#     - packages/terminal-commander           (root wrapper)
#     - packages/terminal-commander-linux-x64 (@terminal-commander/linux-x64)
#     - packages/terminal-commander-linux-arm64 (@terminal-commander/linux-arm64)
#     - packages/terminal-commander-windows-x64 (@terminal-commander/windows-x64)
#     - packages/terminal-commander-mac-x64 (@terminal-commander/mac-x64)
#     - packages/terminal-commander-mac-arm64 (@terminal-commander/mac-arm64)
#
#   The release PR carries the version bump on each `package.json`
#   plus a CHANGELOG entry. When (and only when) the operator merges
#   the release PR, release-please creates the GitHub Release and
#   the matching `v<version>` tag on the SAME workflow run (because
#   the merge commit triggers `push: main`).
#
# NPM07 portion (publish jobs):
#   A single `release-context` job validates and normalizes automatic,
#   ensure-release, and force-publish entry paths. `prepublish-gate`
#   then runs all wrapper/config/version checks before any registry write.
#   When that gate succeeds, the downstream publish chain runs:
#     - build-<platform> + publish-<platform> for all 5 targets
#       (linux-x64, linux-arm64, windows-x64, mac-x64, mac-arm64):
#       each builds the platform binaries and `npm publish`es
#       `@terminal-commander/<platform>` (dist-tag latest).
#     - publish-root: depends on all 5 platform publishes; `npm publish`
#       for the `terminal-commander` root wrapper (latest).
#     - then the crates.io cargo-publish chain (see below).
#   npm publish uses `secrets.NPM_TOKEN_TC` via `NODE_AUTH_TOKEN`
#   (trusted-publisher OIDC not yet configured on npmjs.com for all
#   package names). The release-please job uses `RELEASE_PLEASE_TOKEN_TC`
#   when `GITHUB_TOKEN` cannot open/update the release PR (Bad credentials).
#
# crates.io portion (cargo publish chain):
#   This workflow DOES publish to crates.io. After `publish-root`
#   succeeds, a strictly dep-ordered chain publishes the workspace
#   crates with `cargo publish`:
#     core -> sifters -> probes -> store -> supervisor -> ipc -> daemon -> mcp
#   Each
#   `cargo publish` step authenticates with `CARGO_REGISTRY_TOKEN`
#   set from `secrets.CARGO_REGISTRY_TOKEN_TC`, then polls the
#   crates.io HTTP API until the just-published version is visible
#   before the next crate (whose path-deps resolve against the
#   registry) publishes.
#
# This workflow does NOT:
#   - call the NPM05 `npm-binary-build` workflow (kept separate as a
#     non-publishing CI gate),
#   - auto-merge the release PR (release-pr-sync.yml; feat/fix only),
#   - request `id-token: write` (OIDC may return after trusted
#     publisher is configured on npmjs.com / crates.io for all names).
#
# NOTE: this workflow DOES reference long-lived secrets
#   (NPM_TOKEN_TC, CARGO_REGISTRY_TOKEN_TC, RELEASE_PLEASE_TOKEN_TC)
#   and the cargo-publish chain DOES touch `crates/**`, `Cargo.toml`,
#   and `Cargo.lock` at checkout time. The earlier comment that
#   claimed otherwise predated the crates.io publish chain.
#
# Action pin doctrine (NPM06):
#   `googleapis/release-please-action` is pinned to immutable commit
#   SHA `5c625bfb5d1ff62eadeeb3772007f7f66fdcf071`, which resolves to
#   tag `v4.4.1` (the most recent v4 patch on 2026-05-23). v4 is
#   chosen over v5 because the manifest-mode shape used in this
#   chain matches the v4 README and the Symforge precedent.
#
# Binary-source decision (NPM07):
#   The publish jobs build the three Rust release binaries INLINE
#   (from the merge-commit checkout of `main`, which is the same SHA
#   that release-please tagged). The publish workflow does NOT
#   download artifacts from the `npm-binary-build` workflow; that
#   keeps the npm provenance attestation tied to THIS workflow's
#   build steps and avoids cross-workflow artifact-retention
#   coupling. `npm-binary-build` remains an independent CI gate
#   that runs on every push and never publishes.

name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      recovery_release_as:
        description: "Recovery only — create GitHub release for this version (skips opening a release PR)"
        required: false
        type: string
      force_publish:
        description: "Recovery only — run npm publish jobs for the manifest version (after release PR merge/tag stall)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

env:
  # GitHub forces Node 24 on JS actions (2026-06-02) and removes Node 20
  # (2026-09-16). Run all node20 JS actions on node24 now to clear warnings
  # and pre-empt the cutover without bumping every action major.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  RUST_TOOLCHAIN: "1.95.0"
  NODE_VERSION: "20"

jobs:
  # ----------------------------------------------------------------
  # JOB 1 — release-please (NPM06).
  #
  # Owns the release PR + tag/Release surface. Needs `contents: write`
  # to push version bumps + CHANGELOG into the release PR, and
  # `pull-requests: write` to open / update that PR. No id-token.
  # ----------------------------------------------------------------
  release-please:
    name: release-please
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.final.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released || steps.release_retry.outputs.paths_released }}
      tag_name: ${{ steps.final.outputs.tag_name }}
      version: ${{ steps.final.outputs.version }}
      trigger_pushed: ${{ steps.crates_trigger.outputs.trigger_pushed }}
    steps:
      # crates/** changes are not path-attributed to any packages/ component,
      # so they never trigger release-please. Detect releasable crate commits
      # since the last tag and push one sentinel commit under
      # packages/terminal-commander/ to attribute them to the canonical
      # version source. When a sentinel is pushed, SKIP release-please this
      # run; the pushed commit fires a fresh push:main run that handles it.
      - name: Checkout main (full history for crates trigger)
        if: github.event_name == 'push' && inputs.recovery_release_as == ''
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLEASE_TOKEN_TC }}

      - name: Synthesize crates release attribution
        id: crates_trigger
        if: github.event_name == 'push' && inputs.recovery_release_as == ''
        shell: bash
        run: bash scripts/release/synthesize-crates-release-trigger.sh

      - name: release-please (manifest mode)
        id: release
        if: steps.crates_trigger.outputs.trigger_pushed != 'true'
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071
        with:
          # Manifest mode: both files live under .github/ per the
          # NPM02 contract §7 + §10. Paths are relative to the repo
          # root because release-please-action resolves them from
          # `GITHUB_WORKSPACE` after checking out the repo internally.
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
          token: ${{ secrets.RELEASE_PLEASE_TOKEN_TC }}
          release-as: ${{ inputs.recovery_release_as }}
          skip-github-pull-request: ${{ inputs.recovery_release_as != '' }}

      # Merged release PRs often keep autorelease:pending when the custom
      # title pattern omitted ${version}; that blocks all future releases.
      - name: Clear stale autorelease labels on merged release PRs
        if: >-
          steps.crates_trigger.outputs.trigger_pushed != 'true' &&
          steps.release.outputs.releases_created != 'true' &&
          github.event_name == 'push' &&
          inputs.recovery_release_as == ''
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN_TC }}
        run: |
          set -euo pipefail
          mapfile -t prs < <(gh pr list --state merged --label "autorelease: pending" --json number --jq '.[].number')
          for n in "${prs[@]}"; do
            gh pr edit "$n" --remove-label "autorelease: pending"
            echo "cleared autorelease:pending on PR #${n}"
          done

      # Second pass: after merge, release-please often needs another run to
      # create the tag/GitHub Release (googleapis/release-please#2028).
      - name: release-please tag retry (post-merge)
        id: release_retry
        if: >-
          steps.crates_trigger.outputs.trigger_pushed != 'true' &&
          steps.release.outputs.releases_created != 'true' &&
          github.event_name == 'push' &&
          inputs.recovery_release_as == ''
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
          token: ${{ secrets.RELEASE_PLEASE_TOKEN_TC }}
          skip-github-pull-request: true

      - name: Aggregate release-please outputs
        id: final
        shell: bash
        run: |
          set -euo pipefail
          created="${{ steps.release.outputs.releases_created }}"
          retry="${{ steps.release_retry.outputs.releases_created }}"
          if [ "$created" = "true" ] || [ "$retry" = "true" ]; then
            echo "releases_created=true" >> "$GITHUB_OUTPUT"
          else
            echo "releases_created=false" >> "$GITHUB_OUTPUT"
          fi
          ver="${{ steps.release.outputs['packages/terminal-commander--version'] }}"
          if [ -z "$ver" ]; then
            ver="${{ steps.release_retry.outputs['packages/terminal-commander--version'] }}"
          fi
          echo "version=${ver}" >> "$GITHUB_OUTPUT"
          tag="${{ steps.release.outputs['packages/terminal-commander--tag_name'] }}"
          if [ -z "$tag" ]; then
            tag="${{ steps.release_retry.outputs['packages/terminal-commander--tag_name'] }}"
          fi
          echo "tag_name=${tag}" >> "$GITHUB_OUTPUT"

      - name: Checkout for Cargo.toml parity assertion
        if: steps.final.outputs.releases_created == 'true'
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Assert cargo workspace version matches release-please version
        if: steps.final.outputs.releases_created == 'true'
        shell: bash
        env:
          EXPECTED: ${{ steps.final.outputs.version }}
        run: |
          set -e
          # Use awk for robust extraction (sed regex was over-greedy on
          # the trailing `# x-release-please-version` comment).
          actual=$(awk '/^version = "/{gsub(/^version = "|".*/, ""); print; exit}' Cargo.toml)
          if [ "$actual" != "$EXPECTED" ]; then
            echo "::error::cargo workspace version ($actual) != release-please version ($EXPECTED)"
            exit 1
          fi
          echo "npm-cargo version parity: $actual"

  # After auto-merged release PRs, release-please sometimes skips tag/npm.
  # Close the loop without workflow_dispatch / manual force_publish.
  ensure-release:
    name: ensure-release
    needs: release-please
    if: github.event_name == 'push' && inputs.recovery_release_as == '' && needs.release-please.outputs.trigger_pushed != 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      publish: ${{ steps.ensure.outputs.publish }}
      version: ${{ steps.ensure.outputs.version }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Authenticate as the PAT so the split-manifest self-heal in
          # ensure-release-complete.sh can push its sync commit AND re-trigger
          # release automation. A push under the default GITHUB_TOKEN does not
          # re-trigger workflows (loop-prevention) -- same reason release-pr-sync.yml
          # uses the PAT. persist-credentials defaults to true, so the push reuses it.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN_TC }}

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"

      - name: Ensure tag, GitHub release, and npm publish gap
        id: ensure
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN_TC }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_TC }}
        run: bash scripts/release/ensure-release-complete.sh

      - name: release-please finalize (missing tag only)
        if: steps.ensure.outputs.need_release_please == 'true'
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
          token: ${{ secrets.RELEASE_PLEASE_TOKEN_TC }}
          skip-github-pull-request: true

  # Recovery gate: workflow_dispatch force_publish (manual recovery only).
  publish-version:
    name: publish-version
    if: github.event_name == 'workflow_dispatch' && inputs.force_publish == true
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.manifest.outputs.version }}
      publish: "true"
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Read manifest version
        id: manifest
        shell: bash
        run: |
          set -e
          version=$(node -p "require('./.github/.release-please-manifest.json')['packages/terminal-commander']")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "publish-version: $version"

  # Collapse the three supported release entry paths into one validated,
  # canonical context. Downstream jobs must never reconstruct this fallback.
  release-context:
    name: release-context
    needs:
      - release-please
      - ensure-release
      - publish-version
    if: always() && !cancelled()
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      publish: ${{ steps.context.outputs.publish }}
      version: ${{ steps.context.outputs.version }}
      source: ${{ steps.context.outputs.source }}
    steps:
      - name: Checkout released source
        uses: actions/checkout@v4

      - name: Resolve canonical release context
        id: context
        env:
          RELEASE_PLEASE_RESULT: ${{ needs.release-please.result }}
          RELEASE_CREATED: ${{ needs.release-please.outputs.releases_created }}
          RELEASE_VERSION: ${{ needs.release-please.outputs.version }}
          ENSURE_RESULT: ${{ needs.ensure-release.result }}
          ENSURE_PUBLISH: ${{ needs.ensure-release.outputs.publish }}
          ENSURE_VERSION: ${{ needs.ensure-release.outputs.version }}
          PUBLISH_VERSION_RESULT: ${{ needs.publish-version.result }}
          FORCE_PUBLISH: ${{ needs.publish-version.outputs.publish }}
          FORCE_VERSION: ${{ needs.publish-version.outputs.version }}
        run: node scripts/release/resolve-release-context.js

  # No registry mutation is allowed before this job succeeds. This duplicates
  # the PR gate intentionally as defense in depth for manual recovery runs.
  prepublish-gate:
    name: prepublish-gate
    needs: release-context
    if: needs.release-context.outputs.publish == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout released source
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run root wrapper unit tests from a clean checkout
        working-directory: packages/terminal-commander
        run: npm test

      - name: Validate release configuration
        run: node scripts/release/test-release-please-config.js

      - name: Validate every committed version anchor
        env:
          EXPECTED_VERSION: ${{ needs.release-context.outputs.version }}
        run: node scripts/release/validate-release-inputs.js "$EXPECTED_VERSION"

  # ----------------------------------------------------------------
  # PLATFORM JOBS — build + publish (NPM07).
  #
  # For each of the 5 platforms (linux-x64, linux-arm64, windows-x64,
  # mac-x64, mac-arm64) there is a pair of jobs:
  #
  #   build-<platform>   — calls reusable `_build-platform-binary.yml`
  #                        which compiles the 3 Rust binaries on the
  #                        appropriate native runner, stages them into
  #                        the platform package's bin/ dir, tars to
  #                        preserve the +x bit, and uploads the tar as
  #                        a `tc-bin-<platform>` artifact.
  #
  #   publish-<platform> — downloads the bin.tar artifact on a small
  #                        ubuntu-24.04 runner, extracts it (restoring
  #                        the executable bit), validates the package
  #                        version against release-please's output, and
  #                        runs `npm publish --access public` against
  #                        `@terminal-commander/<platform>`.
  #
  # 0.2.0 token-mode auth: NODE_AUTH_TOKEN: secrets.NPM_TOKEN_TC.
  # No `--provenance`, no `id-token: write`, no Node 22.14. Task 23
  # owns the OIDC cutover after operator one-time UI setup on
  # npmjs.com (trusted publishers).
  #
  # Drift-proof: every platform binary build flows through the single
  # reusable workflow `_build-platform-binary.yml`, the same workflow
  # called by the PR-time `npm-binary-build.yml` CI gate. Same source
  # of truth for both PR validation and release-time publish.
  # ----------------------------------------------------------------

  # ---------- linux-x64 ----------
  build-linux-x64:
    needs:
      - release-context
      - prepublish-gate
    if: >-
      always() && !cancelled() &&
      needs.release-context.outputs.publish == 'true' &&
      needs.prepublish-gate.result == 'success'
    uses: ./.github/workflows/_build-platform-binary.yml
    with:
      platform: linux-x64
      upload_artifact: true

  presmoke-linux-x64:
    name: presmoke-linux-x64
    needs:
      - release-context
      - build-linux-x64
    if: >-
      always() && !cancelled() &&
      needs.build-linux-x64.result == 'success' &&
      needs.release-context.outputs.publish == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Download bin.tar artifact
        uses: actions/download-artifact@v4
        with:
          name: tc-bin-linux-x64
          path: pkg/
      - name: Extract bin.tar (preserves +x mode)
        shell: bash
        run: |
          set -euo pipefail
          cd pkg
          tar -xf bin.tar
          rm bin.tar
          ls -la bin/
      - name: Load the BUILT binary on the glibc floor (bookworm, pre-publish)
        shell: bash
        run: |
          # The built artifact must LOAD + run on the floor distro
          # (Debian 12 bookworm, glibc 2.36) BEFORE we publish it. This
          # is the gate v0.1.13 lacked (its verify ran post-publish).
          # Exec the staged binary directly (the platform package has no
          # `bin` field; the CLI is exposed by the root wrapper, not
          # needed for a load test). rc 0 or 124 (clean timeout) = pass.
          set -euo pipefail
          docker run --rm -v "$PWD/pkg/bin:/tcbin:ro" node:22-bookworm-slim sh -c '
            set -e
            /tcbin/terminal-commander-mcp --version
            echo "{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"initialize\",\"params\":{\"protocolVersion\":\"2024-11-05\",\"capabilities\":{},\"clientInfo\":{\"name\":\"presmoke\",\"version\":\"0.0.0\"}}}" \
              | timeout 10 /tcbin/terminal-commander-mcp; rc=$?
            if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
              echo "::error::pre-publish stdio probe exited $rc on bookworm" >&2; exit "$rc"
            fi
            echo "presmoke-linux-x64: OK (loads + runs on glibc 2.36)"
          '

  publish-linux-x64:
    name: publish-linux-x64
    needs:
      - release-context
      - build-linux-x64
      - presmoke-linux-x64
    if: >-
      always() && !cancelled() &&
      needs.build-linux-x64.result == 'success' &&
      needs.presmoke-linux-x64.result == 'success' &&
      needs.release-context.outputs.publish == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout (released SHA on main)
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }} with npm registry
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"

      - name: Download bin.tar artifact
        uses: actions/download-artifact@v4
        with:
          name: tc-bin-linux-x64
          path: packages/terminal-commander-linux-x64/

      - name: Extract bin.tar (preserves +x mode)
        shell: bash
        run: |
          set -euo pipefail
          cd packages/terminal-commander-linux-x64
          rm -rf bin
          tar -xf bin.tar
          rm bin.tar
          ls -la bin/

      - name: Confirm package version matches release-please output
        shell: bash
        env:
          EXPECTED_VERSION: ${{ needs.release-context.outputs.version }}
        run: |
          set -e
          actual=$(node -p "require('./packages/terminal-commander-linux-x64/package.json').version")
          if [ "$actual" != "$EXPECTED_VERSION" ]; then
            echo "::error::version mismatch: package.json=$actual release-please=$EXPECTED_VERSION"
            exit 1
          fi
          echo "version-match: $actual"

      - name: npm publish --access public (NPM_TOKEN_TC for 0.2.0; OIDC + --provenance at Task 23)
        shell: bash
        working-directory: packages/terminal-commander-linux-x64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_TC }}
        run: |
          set -e
          if npm publish --access public; then
            exit 0
          fi
          # Recovery: workflow_dispatch + force_publish + already-on-registry → exit 0.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_publish }}" = "true" ]; then
            ver=$(node -p "require('./package.json').version")
            name=$(node -p "require('./package.json').name")
            if npm view "${name}@${ver}" version >/dev/null 2>&1; then
              echo "::warning::${name}@${ver} already on registry (force_publish recovery)"
              exit 0
            fi
          fi
          exit 1

  # ---------- linux-arm64 ----------
  build-linux-arm64:
    needs:
      - release-context
      - prepublish-gate
    if: >-
      always() && !cancelled() &&
      needs.release-context.outputs.publish == 'true' &&
      needs.prepublish-gate.result == 'success'
    uses: ./.github/workflows/_build-platform-binary.yml
    with:
      platform: linux-arm64
      upload_artifact: true

  presmoke-linux-arm64:
    name: presmoke-linux-arm64
    needs:
      - release-context
      - build-linux-arm64
    if: >-
      always() && !cancelled() &&
      needs.build-linux-arm64.result == 'success' &&
      needs.release-context.outputs.publish == 'true'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - name: Download bin.tar artifact
        uses: actions/download-artifact@v4
        with:
          name: tc-bin-linux-arm64
          path: pkg/
      - name: Extract bin.tar (preserves +x mode)
        shell: bash
        run: |
          set -euo pipefail
          cd pkg
          tar -xf bin.tar
          rm bin.tar
          ls -la bin/
      - name: Load the BUILT binary on the glibc floor (bookworm, pre-publish)
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD/pkg/bin:/tcbin:ro" node:22-bookworm-slim sh -c '
            set -e
            /tcbin/terminal-commander-mcp --version
            echo "{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"initialize\",\"params\":{\"protocolVersion\":\"2024-11-05\",\"capabilities\":{},\"clientInfo\":{\"name\":\"presmoke\",\"version\":\"0.0.0\"}}}" \
              | timeout 10 /tcbin/terminal-commander-mcp; rc=$?
            if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
              echo "::error::pre-publish stdio probe exited $rc on bookworm" >&2; exit "$rc"
            fi
            echo "presmoke-linux-arm64: OK (loads + runs on glibc 2.36)"
          '

  publish-linux-arm64:
    name: publish-linux-arm64
    needs:
      - release-context
      - build-linux-arm64
      - presmoke-linux-arm64
    if: >-
      always() && !cancelled() &&
      needs.build-linux-arm64.result == 'success' &&
      needs.presmoke-linux-arm64.result == 'success' &&
      needs.release-context.outputs.publish == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout (released SHA on main)
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }} with npm registry
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"

      - name: Download bin.tar artifact
        uses: actions/download-artifact@v4
        with:
          name: tc-bin-linux-arm64
          path: packages/terminal-commander-linux-arm64/

      - name: Extract bin.tar (preserves +x mode)
        shell: bash
        run: |
          set -euo pipefail
          cd packages/terminal-commander-linux-arm64
