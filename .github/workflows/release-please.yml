      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-publish-terminal-commander-core
      - name: Assert crate version matches release-please version
        shell: bash
        env:
          EXPECTED: ${{ needs.release-context.outputs.version }}
        run: |
          set -e
          actual=$(cargo pkgid -p terminal-commander-core | awk -F'[@#]' '{print $NF}')
          if [ "$actual" != "$EXPECTED" ]; then
            echo "::error::cargo crate version ($actual) != release-please version ($EXPECTED)"
            exit 1
          fi
      - name: cargo publish --dry-run
        run: cargo publish --dry-run -p terminal-commander-core
      - name: cargo publish (CARGO_REGISTRY_TOKEN_TC for 0.2.0; OIDC at Task 23)
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN_TC }}
        run: |
          set -e
          if cargo publish -p terminal-commander-core; then
            exit 0
          fi
          # Recovery: crates.io HTTP API — deterministic JSON.
          # Returns 200 + JSON if version exists, 404 if not.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_publish }}" = "true" ]; then
            ver=$(cargo pkgid -p terminal-commander-core | awk -F'[@#]' '{print $NF}')
            url="https://crates.io/api/v1/crates/terminal-commander-core/$ver"
            http_code=$(curl -sS -o /tmp/api.json -w '%{http_code}' \
              -H 'User-Agent: terminal-commander-recovery (https://github.com/special-place-administrator/terminal-commander)' \
              "$url")
            if [ "$http_code" = "200" ]; then
              echo "::warning::terminal-commander-core@$ver already on crates.io (HTTP 200, force_publish recovery)"
              exit 0
            fi
            echo "crates.io API returned HTTP $http_code; payload:"
            cat /tmp/api.json
          fi
          exit 1
      - name: Poll crates.io until this crate's version is queryable (max 5 min)
        shell: bash
        env:
          JOB: ${{ github.job }}
          EXPECTED: ${{ needs.release-context.outputs.version }}
        run: |
          # Codex review I1 (2026-05-25): fixed sleep 60 is fragile when
          # crates.io sparse-index lag exceeds 60s. Poll instead: query
          # the HTTP API every 10s up to 5 min, exit success when the
          # just-published version appears. The next cargo job's
          # `cargo publish --dry-run` resolves this crate as a dep, so
          # gating on real availability eliminates the propagation race.
          set -e
          # Job name is `publish-cargo-<crate>`; derive crate name.
          crate="${JOB#publish-cargo-}"
          url="https://crates.io/api/v1/crates/${crate}/${EXPECTED}"
          for i in $(seq 1 30); do
            http_code=$(curl -sS -o /dev/null -w '%{http_code}' \
              -H 'User-Agent: terminal-commander-release (https://github.com/special-place-administrator/terminal-commander)' \
              "$url" || echo "000")
            if [ "$http_code" = "200" ]; then
              echo "${crate}@${EXPECTED} visible on crates.io after ${i} polls (~$((i * 10))s)"
              exit 0
            fi
            echo "poll ${i}/30: HTTP ${http_code}, waiting 10s"
            sleep 10
          done
          echo "::error::${crate}@${EXPECTED} did not appear on crates.io within 5 min"
          exit 1

